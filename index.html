<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>المؤذن الإلكتروني</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      font-family:'Cairo',sans-serif;

      background:#4a0707;

      min-height:100vh;

      display:flex;

      justify-content:center;

      align-items:center;

      padding:25px;
    }

    .board{

      width:100%;

      max-width:1400px;

      background:#e8c58d;

      border:18px solid #7a1212;

      border-radius:28px;

      padding:28px;

      box-shadow:0 25px 60px rgba(0,0,0,0.45);
    }

    .title{

      background:#7a1212;

      color:white;

      text-align:center;

      padding:20px;

      border-radius:20px;

      font-size:54px;

      font-weight:900;

      margin-bottom:25px;
    }

    .clock{

      background:black;

      color:#ff0000;

      text-align:center;

      font-size:90px;

      font-family:monospace;

      padding:18px;

      border-radius:20px;

      margin-bottom:25px;

      letter-spacing:5px;

      box-shadow:0 10px 25px rgba(0,0,0,0.35);
    }

    .next-prayer{

      background:black;

      color:#00ff66;

      text-align:center;

      font-size:42px;

      padding:18px;

      border-radius:18px;

      margin-bottom:35px;

      font-weight:bold;

      box-shadow:0 8px 20px rgba(0,0,0,0.25);
    }

    .grid{

      display:grid;

      grid-template-columns:1fr 220px 1fr;

      gap:24px;

      align-items:stretch;
    }

    .column-title{

      text-align:center;

      font-size:42px;

      font-weight:900;

      margin-bottom:20px;

      color:#111;
    }

    .time-box{

      background:black;

      border-radius:18px;

      padding:20px;

      margin-bottom:20px;

      text-align:center;

      box-shadow:0 8px 18px rgba(0,0,0,0.25);

      height:190px;

      display:flex;

      flex-direction:column;

      justify-content:center;
    }

    .azan .time-box{
      color:#ff0000;
    }

    .eqama .time-box{
      color:#00ff66;
    }

    .prayer-name{

      color:white;

      font-size:38px;

      margin-bottom:18px;

      font-weight:700;
    }

    .time{

      font-size:70px;

      font-family:monospace;

      letter-spacing:3px;
    }

    .center{

      background:#b56d27;

      border-radius:22px;

      padding:18px;

      display:flex;

      flex-direction:column;

      justify-content:space-between;

      align-items:center;

      box-shadow:0 8px 18px rgba(0,0,0,0.25);
    }

    .center div{

      flex:1;

      width:100%;

      display:flex;

      justify-content:center;

      align-items:center;

      font-size:48px;

      font-weight:900;

      color:black;
    }

    .bottom{

      display:flex;

      justify-content:space-between;

      margin-top:30px;

      gap:15px;

      flex-wrap:wrap;
    }

    .bottom-box{

      background:black;

      color:#ffcc00;

      padding:18px 28px;

      border-radius:18px;

      font-size:42px;

      font-weight:900;

      box-shadow:0 8px 18px rgba(0,0,0,0.25);
    }

    .footer{

      text-align:center;

      margin-top:28px;

      color:#555;

      font-weight:bold;

      font-size:22px;
    }

    @media(max-width:900px){

      .grid{
        grid-template-columns:1fr;
      }

      .clock{
        font-size:56px;
      }

      .title{
        font-size:34px;
      }

      .time{
        font-size:50px;
      }

      .prayer-name{
        font-size:28px;
      }

      .center div{
        padding:18px 0;
        font-size:34px;
      }

      .column-title{
        font-size:32px;
      }

      .next-prayer{
        font-size:28px;
      }

    }

  </style>

</head>

<body>

<div class="board">

  <div class="title">
    المؤذن الإلكتروني
  </div>

  <div class="clock" id="clock">
    00:00:00
  </div>

  <div class="next-prayer" id="nextPrayer">
    باقي على الفجر : 00:00:00
  </div>

  <div class="grid">

    <!-- AZAN -->

    <div class="azan">

      <div class="column-title">
        الأذان
      </div>

      <div class="time-box">
        <div class="prayer-name">الفجر</div>
        <div class="time">04:15</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">الظهر</div>
        <div class="time">12:05</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">العصر</div>
        <div class="time">15:42</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">المغرب</div>
        <div class="time">18:31</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">العشاء</div>
        <div class="time">19:58</div>
      </div>

    </div>

    <!-- CENTER -->

    <div class="center">

      <div>الفجر</div>

      <div>الظهر</div>

      <div>العصر</div>

      <div>المغرب</div>

      <div>العشاء</div>

    </div>

    <!-- EQAMA -->

    <div class="eqama">

      <div class="column-title">
        الإقامة
      </div>

      <div class="time-box">
        <div class="prayer-name">الفجر</div>
        <div class="time">04:35</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">الظهر</div>
        <div class="time">12:20</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">العصر</div>
        <div class="time">15:55</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">المغرب</div>
        <div class="time">18:36</div>
      </div>

      <div class="time-box">
        <div class="prayer-name">العشاء</div>
        <div class="time">20:10</div>
      </div>

    </div>

  </div>

  <div class="bottom">

    <div class="bottom-box">
      القائمة
    </div>

    <div class="bottom-box">
      29°C
    </div>

  </div>

  <div class="footer">
    Electronic Azan © 2026
  </div>

</div>

<script>

function updateClock(){

  const now = new Date();

  const h = String(now.getHours()).padStart(2,'0');

  const m = String(now.getMinutes()).padStart(2,'0');

  const s = String(now.getSeconds()).padStart(2,'0');

  document.getElementById("clock").innerHTML =
    h + ":" + m + ":" + s;
}

setInterval(updateClock,1000);

updateClock();

const prayers = [

  { name: "الفجر", time: "04:15" },

  { name: "الظهر", time: "12:05" },

  { name: "العصر", time: "15:42" },

  { name: "المغرب", time: "18:31" },

  { name: "العشاء", time: "19:58" }

];

function getNextPrayer(){

  const now = new Date();

  for(let prayer of prayers){

    const [hours,minutes] = prayer.time.split(":");

    const prayerDate = new Date();

    prayerDate.setHours(hours);

    prayerDate.setMinutes(minutes);

    prayerDate.setSeconds(0);

    if(prayerDate > now){

      return {

        name: prayer.name,

        date: prayerDate
      };

    }

  }

  const fajr = prayers[0];

  const [hours,minutes] = fajr.time.split(":");

  const tomorrow = new Date();

  tomorrow.setDate(tomorrow.getDate()+1);

  tomorrow.setHours(hours);

  tomorrow.setMinutes(minutes);

  tomorrow.setSeconds(0);

  return {

    name:fajr.name,

    date:tomorrow
  };

}

function updateCountdown(){

  const nextPrayer = getNextPrayer();

  const now = new Date();

  const diff = nextPrayer.date - now;

  const hours =
    Math.floor(diff / (1000*60*60));

  const minutes =
    Math.floor((diff % (1000*60*60)) / (1000*60));

  const seconds =
    Math.floor((diff % (1000*60)) / 1000);

  const formatted =

    String(hours).padStart(2,'0') + ":" +

    String(minutes).padStart(2,'0') + ":" +

    String(seconds).padStart(2,'0');

  document.getElementById("nextPrayer").innerHTML =

    "باقي على " +

    nextPrayer.name +

    " : " +

    formatted;

}

setInterval(updateCountdown,1000);

updateCountdown();

</script>

</body>

</html>
